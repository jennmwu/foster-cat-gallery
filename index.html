const tapeOrder = ['tape-red','tape-cobalt','tape-green','tape-amber','tape-cream'];

// Parse a "Month YYYY" or "Month DD, YYYY" string to a Date
function parseDate(str) {
  if (!str) return null;
  const d = new Date(str);
  if (!isNaN(d)) return d;
  // try "Month YYYY"
  const m = str.match(/^(\w+)\s+(\d{4})$/);
  if (m) return new Date(`${m[1]} 1, ${m[2]}`);
  return null;
}

function duration(intake, exit) {
  const start = parseDate(intake);
  const end = exit ? parseDate(exit) : new Date();
  if (!start) return '';
  const diffMs = end - start;
  const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
  if (diffDays < 14) {
    const wks = Math.round(diffDays / 7);
    return wks <= 1 ? '1 week' : `${wks} weeks`;
  }
  const diffMonths = (end.getFullYear() - start.getFullYear()) * 12 + (end.getMonth() - start.getMonth());
  if (diffMonths < 24) {
    const label = diffMonths === 1 ? '1 month' : `${diffMonths} months`;
    return exit ? label : `${label} & counting`;
  }
  const yrs = Math.floor(diffMonths / 12);
  const label = yrs === 1 ? '1 yr' : `${yrs} yrs`;
  return exit ? label : `${label} & counting`;
}

function buildCard(cat) {
  const tapeClass = tapeOrder[cat.id % tapeOrder.length];
  const tapeClass2 = tapeOrder[(cat.id + 2) % tapeOrder.length];
  const dur = duration(cat.intake, cat.exit);
  const memorialMark = cat.memorial ? ' ✦' : '';

  // Front
  const front = document.createElement('div');
  front.className = 'flip-front';

  // Tape strips
  const tape1 = document.createElement('div');
  tape1.className = `card-tape ${tapeClass}`;
  front.appendChild(tape1);

  const photoWrap = document.createElement('div');
  photoWrap.className = 'photo-wrap' + (cat.memorial ? ' memorial-photo' : '');
  const img = document.createElement('img');
  img.src = cat.hero;
  img.alt = `${cat.name} the foster cat`;
  img.loading = 'lazy';
  photoWrap.appendChild(img);
  front.appendChild(photoWrap);

  const caption = document.createElement('div');
  caption.className = 'caption';
  const nameSpan = document.createElement('span');
  nameSpan.className = 'cat-name';
  nameSpan.textContent = cat.name;
  const descSpan = document.createElement('span');
  descSpan.className = 'cat-desc';
  descSpan.textContent = cat.description;
  caption.appendChild(nameSpan);
  caption.appendChild(descSpan);
  front.appendChild(caption);

  // Current badge
  if (cat.current) {
    const badge = document.createElement('div');
    badge.className = 'current-badge';
    badge.textContent = 'with us now \u2665';
    front.appendChild(badge);
  }

  // Back
  const back = document.createElement('div');
  back.className = 'flip-back';

  function row(label, value) {
    const r = document.createElement('div');
    r.className = 'back-row';
    const l = document.createElement('div');
    l.className = 'back-label';
    l.textContent = label;
    const v = document.createElement('div');
    v.className = 'back-value';
    v.textContent = value;
    r.appendChild(l);
    r.appendChild(v);
    return r;
  }

  // New format: who / where / when / status
  const whoRow = row('who', cat.name);
  if (cat.aka) {
    const akaEl = document.createElement('div');
    akaEl.style.cssText = "font-family:'Patrick Hand',cursive;font-size:11px;color:#6A655C;font-style:italic;margin-top:1px;";
    akaEl.textContent = `aka ${cat.aka}`;
    whoRow.appendChild(akaEl);
  }
  back.appendChild(whoRow);
  back.appendChild(row('where', cat.location));

  const whenStr = cat.exit
    ? `${cat.intake} – ${cat.exit}`
    : `${cat.intake} – present`;
  back.appendChild(row('when', whenStr));

  let statusText = cat.status;
  if (cat.memorial) statusText = 'Resting in peace ✦';
  back.appendChild(row('status', statusText));

  // Photo thumbnails: show up to 3; if >3, slot 3 is "see more"
  const allExtras = cat.extra || [];
  if (allExtras.length > 0) {
    const thumbs = document.createElement('div');
    thumbs.className = 'back-thumbs';

    const hasMore = allExtras.length > 3;
    const show = hasMore ? allExtras.slice(0, 2) : allExtras;

    show.forEach((src, i) => {
      const t = document.createElement('div');
      t.className = 'back-thumb';
      t.setAttribute('role', 'button');
      t.setAttribute('aria-label', `Photo ${i + 1} of ${cat.name}`);
      const tImg = document.createElement('img');
      tImg.src = src;
      tImg.alt = `${cat.name} photo ${i + 1}`;
      tImg.loading = 'lazy';
      t.appendChild(tImg);
      t.addEventListener('click', (e) => {
        e.stopPropagation();
        openLightbox(allExtras, cat.name, i);
      });
      thumbs.appendChild(t);
    });

    if (hasMore) {
      const more = document.createElement('div');
      more.className = 'back-thumb back-thumb-more';
      more.textContent = `see more`;
      more.setAttribute('role', 'button');
      more.addEventListener('click', (e) => {
        e.stopPropagation();
        openLightbox(allExtras, cat.name, show.length);
      });
      thumbs.appendChild(more);
    }

    back.appendChild(thumbs);
  }

  // Flip inner
  const flipInner = document.createElement('div');
  flipInner.className = 'flip-inner';
  flipInner.appendChild(front);
  flipInner.appendChild(back);

  // Button wrapper
  const btn = document.createElement('button');
  btn.className = 'polaroid-btn';
  btn.setAttribute('aria-label', `${cat.name}: ${cat.description}. Click to flip.`);
  btn.setAttribute('aria-pressed', 'false');
  btn.appendChild(flipInner);

  // Assign rotation on load
  const rot = (Math.random() * 10 - 5).toFixed(1);
  flipInner.style.transform = `rotate(${rot}deg)`;
  btn.dataset.rot = rot;

  btn.addEventListener('click', () => {
    const isFlipped = btn.classList.toggle('flipped');
    btn.setAttribute('aria-pressed', isFlipped ? 'true' : 'false');
    // Restore base rotation when not flipped
    if (!isFlipped) {
      flipInner.style.transform = `rotate(${btn.dataset.rot}deg)`;
    } else {
      flipInner.style.transform = `rotateY(180deg) rotate(${btn.dataset.rot}deg)`;
    }
  });

  btn.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      btn.click();
    }
  });

  // Hover: override inline transform
  btn.addEventListener('mouseenter', () => {
    if (!btn.classList.contains('flipped')) {
      flipInner.style.transform = `rotate(0deg) translateY(-9px) scale(1.05)`;
      flipInner.style.transition = 'transform 0.22s ease';
      flipInner.style.zIndex = '10';
    }
  });
  btn.addEventListener('mouseleave', () => {
    if (!btn.classList.contains('flipped')) {
      flipInner.style.transform = `rotate(${btn.dataset.rot}deg)`;
      flipInner.style.transition = 'transform 0.55s cubic-bezier(.4,0,.2,1)';
      flipInner.style.zIndex = '';
    }
  });

  return btn;
}

// Render board
const board = document.getElementById('board');
[...cats].reverse().forEach(cat => board.appendChild(buildCard(cat)));

// Lightbox
let lbPhotos = [];
let lbIndex = 0;
let lbName = '';

function openLightbox(photos, name, idx) {
  lbPhotos = photos;
  lbName = name;
  lbIndex = idx;
  updateLightbox();
  document.getElementById('lightbox').classList.add('open');
  document.getElementById('lb-img').focus();
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

function updateLightbox() {
  const img = document.getElementById('lb-img');
  img.src = lbPhotos[lbIndex];
  img.alt = `${lbName} photo ${lbIndex + 1} of ${lbPhotos.length}`;
  document.getElementById('lb-counter').textContent = `${lbIndex + 1} / ${lbPhotos.length}`;
}

document.getElementById('lb-close').addEventListener('click', closeLightbox);
document.getElementById('lb-prev').addEventListener('click', () => {
  lbIndex = (lbIndex - 1 + lbPhotos.length) % lbPhotos.length;
  updateLightbox();
});
document.getElementById('lb-next').addEventListener('click', () => {
  lbIndex = (lbIndex + 1) % lbPhotos.length;
  updateLightbox();
});
document.getElementById('lightbox').addEventListener('click', (e) => {
  if (e.target === document.getElementById('lightbox')) closeLightbox();
});
document.addEventListener('keydown', (e) => {
  const lb = document.getElementById('lightbox');
  if (!lb.classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') { lbIndex = (lbIndex - 1 + lbPhotos.length) % lbPhotos.length; updateLightbox(); }
  if (e.key === 'ArrowRight') { lbIndex = (lbIndex + 1) % lbPhotos.length; updateLightbox(); }
});

// Reduced motion: instant flip
const mq = window.matchMedia('(prefers-reduced-motion: reduce)');
if (mq.matches) {
  document.querySelectorAll('.flip-inner').forEach(el => {
    el.style.transition = 'none';
  });
}
</script>
